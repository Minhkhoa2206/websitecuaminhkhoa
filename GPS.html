<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Định vị Vị trí</title>
    <style>
        #map {
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body onload="getLocation()">
    <h1>Định vị Vị trí</h1>

    <div id="map"></div>

    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                alert("Trình duyệt của bạn không hỗ trợ định vị vị trí.");
            }
        }

        function showPosition(position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            // Hiển thị vị trí trên bản đồ
            showMap(latitude, longitude);
        }

        function showError(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    alert("Người dùng từ chối yêu cầu định vị vị trí.");
                    break;
                case error.POSITION_UNAVAILABLE:
                    alert("Thông tin vị trí không có sẵn.");
                    break;
                case error.TIMEOUT:
                    alert("Yêu cầu định vị vị trí đã quá thời gian.");
                    break;
                case error.UNKNOWN_ERROR:
                    alert("Đã xảy ra lỗi không xác định.");
                    break;
            }
        }

        function showMap(latitude, longitude) {
            // Hiển thị bản đồ sử dụng Google Maps hoặc OpenStreetMap
            const mapElement = document.getElementById('map');
            mapElement.innerHTML = `<iframe
                width="100%"
                height="400"
                frameborder="0" style="border:0"
                src="https://www.google.com/maps/embed/v1/place?q=${latitude},${longitude}&key=YOUR_GOOGLE_MAPS_API_KEY" allowfullscreen>
            </iframe>`;
        }
    </script>
</body>
</html>
