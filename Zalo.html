<!DOCTYPE html>

<head>
  <meta charset="utf-8" />
  <title>Zalo</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;

      border-radius: 5px;
      margin-bottom: 20px;
    }

      color: #333;
    }

    p {
      color: #666;
      font-size: 18px;
    }

<body>

    <img src="zalop.jpg" alt="Zalop Image" />

  </div>

</html>
