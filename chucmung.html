<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chữ 3D Màu Sắc Ngẫu Nhiên</title>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: url('nen.png') center/cover no-repeat; /* Thay đổi đường dẫn 'nen.png' theo đường dẫn của bạn */
        }

        .text-container {
            text-align: center;
            margin-bottom: 20px; /* Thêm khoảng cách giữa văn bản và nút */
        }

        .colorful-text {
            font-size: 2.5em; /* Tăng kích thước chữ để nổi bật hơn */
            font-weight: bold;
            background: linear-gradient(45deg, #ff0000, #00ff00, #0000ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: colorChange 5s infinite;
        }

        @keyframes colorChange {
            0% {
                filter: hue-rotate(0deg);
            }
            100% {
                filter: hue-rotate(360deg);
            }
        }

        .website-button {
            padding: 15px 30px;
            background: linear-gradient(45deg, #ff9900, #ff3366); /* Màu sắc ngẫu nhiên cho nền nút */
            border: none;
            color: #fff;
            font-size: 1.5em; /* Tăng kích thước chữ để nổi bật hơn */
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .website-button:hover {
            background: linear-gradient(45deg, #ff3366, #ff9900); /* Màu sắc ngẫu nhiên khác khi hover */
        }
    </style>
</head>
<body>
    <div class="text-container">
        <p class="colorful-text">CẢM ƠN BẠN ĐÃ TIN TƯỞNG SỬ DỤNG PHẦN MỀM</p>
        <button class="website-button" onclick="window.location.href='Trangchu.html'">Website</button>
    </div>
</body>
</html>
