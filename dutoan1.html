<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page with Background Image</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('nen.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
        }

        #login-container {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        #nameInput {
            padding: 10px;
            margin: 10px 0;
            width: 200px;
            border: none;
            border-radius: 5px;
        }

        #checkButton {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="login-container">
        <h1>Đăng nhập</h1>
        <label for="nameInput">Nhập tên:</label>
        <input type="text" id="nameInput">
        <br>
        <button id="checkButton" onclick="checkName()">Kiểm tra</button>
        <div id="result"></div>
    </div>

    <script>
        let allowedNames = ['Khoa', 'Tài', 'Được', 'Quốc', 'Kiệt'];

        function checkName() {
            let nameInput = document.getElementById('nameInput').value;
            let resultDiv = document.getElementById('result');

            if (allowedNames.includes(nameInput)) {
                resultDiv.innerHTML = 'Tên hợp lệ. Chuyển hướng đến <a href="https://www.ketcaumkpr.id.vn/dutoan.html">đây</a>.';
            } else {
                resultDiv.innerHTML = 'Tên không hợp lệ.';
            }
        }
    </script>

</body>
</html>
