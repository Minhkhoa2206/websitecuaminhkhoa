<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang Truy Cập Website</title>
    <link rel="icon" href="index.jpg" type="image/png">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            font-family: 'Arial', sans-serif;
        }

        #intro-container {
            text-align: center;
        }

        #intro-container img {
            max-width: 60%; /* Giảm kích thước hình ảnh */
            height: auto;
            border-radius: 12px; /* Bo tròn góc với giá trị border-radius */
            opacity: 0;
            transform: translateY(20px);
        }

        h1, p {
            font-size: 24px;
            margin: 10px 0;
        }

        h1 {
            color: #ffcc00; /* Màu vàng */
        }

        p {
            color: #66ccff; /* Màu xanh dương */
        }
    </style>
</head>
<body>
    <div id="intro-container">
        <img id="intro-image" src="OIG.jpg" alt="Intro Image">
        <h1>Welcome to Our Website</h1>
        <p>This is a beautiful intro to our website. Enjoy the journey!</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.0/anime.min.js"></script>
    <script>
        const introContainer = document.getElementById("intro-container");
        const introImage = document.getElementById("intro-image");

        // Animation using Anime.js
        anime({
            targets: introImage,
            opacity: 1,
            translateY: 0,
            duration: 2000,
            easing: 'easeInOutQuad',
            delay: 1000,
            complete: () => {
                // Redirect to the destination URL after the animation
                window.location.href = "Trangchu.html";
            }
        });
    </script>
</body>
</html>
