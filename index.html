<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truy Cap He Thong</title>
    <link rel="icon" href="index.jpg" type="image/png">
    
<style>
    body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: url('nen.png') center/cover fixed no-repeat;
        font-family: 'Arial', sans-serif;
        color: #fff;
    }
    
    #loading-container {
        text-align: center;
        transform: scale(1.5);
    }
    
    #logo {
        font-size: 48px;
        margin-bottom: 20px;
        font-family: 'Arial', sans-serif;
        text-transform: uppercase;
        display: inline-block;
        background: linear-gradient(to right, #ff5733, #ff9933, #ffcc33, #ccff33, #33ff33, #33ffcc, #3399ff, #3333ff, #9933ff, #ff33cc) text;
        color: transparent;
        text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.5);
    }
    
    #loading-bar-container {
        width: 300px;
        height: 20px;
        background: linear-gradient(to right, #ff5733, #ff9933, #ffcc33, #ccff33, #33ff33, #33ffcc, #3399ff, #3333ff, #9933ff, #ff33cc);
        border-radius: 10px;
        overflow: hidden;
        margin-top: 20px;
    }
    
    #loading-bar {
        width: 0;
        height: 100%;
        background: linear-gradient(to right, #3333ff, #9933ff, #ff33cc);
        border-radius: 10px;
        transition: width 1s ease;
    }
    
    @media (max-width: 768px) {
        #loading-container {
            transform: scale(1);
        }
    
        #logo {
            font-size: 5vw;
        }
    
        #loading-bar-container {
            width: 80vw;
            height: 5vw;
            margin-top: 5vw;
        }
    }
    
        
    </style>
</head>

<body>
    <div id="loading-container">
        <div id="logo">KETCAUMKPR</div>
        <div id="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
    </div>

    <script>
        // Calculate the time to decode the problem based on network speed
        function calculateDecodingTime(speed) {
            const baseTime = isFirstVisit() ? 40000 : (Math.random() > 0.5 ? 20000 : 30000);
            const speedMultiplier = 1 / speed; // Invert speed for faster connections
            const decodingTime = baseTime * speedMultiplier; // Time in milliseconds
            return decodingTime;
        }

        // Check if it's the user's first visit to the website
        function isFirstVisit() {
            if (localStorage.getItem('firstVisit') === null) {
                localStorage.setItem('firstVisit', 'false');
                return true;
            }
            return false;
        }

        // Simulate loading progress
        let progress = 0;
        let loadingBar = document.getElementById('loading-bar');

        function simulateLoading() {
            if (progress < 100) {
                progress += 1;
                loadingBar.style.width = `${progress}%`;
                setTimeout(simulateLoading, decodingTime / 100);
            } else {
                // Loading complete, add a delay before redirecting
                setTimeout(function() {
                    // Change the background color to black (optional)
                    document.body.style.backgroundColor = '#000';
                    
                    // Redirect to index.html
                    window.location.href = 'Trangchu.html';
                }, 2000); // 2000 milliseconds (2 seconds)
            }
        }

        // Get network speed from navigator.connection (if available)
        const speed = navigator.connection ? navigator.connection.downlink : 1;

        // Calculate decoding time based on network speed
        const decodingTime = calculateDecodingTime(speed);

        // Start loading simulation
        simulateLoading();
    </script>
</body>

</html>
