<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VUI LÒNG ĐỢI...</title>
    <link rel="icon" href="index.jpg" type="image/png">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            font-family: 'Arial', sans-serif;
        }

        #intro-container {
            text-align: center;
        }

        #intro-container img {
            max-width: 40%;
            height: auto;
            border-radius: 12px;
            opacity: 0;
            transform: translateY(20px);
        }

        h1, p {
            font-size: 24px;
            margin: 10px 0;
        }

        h1 {
            color: #ffcc00;
        }

        p {
            color: #66ccff;
        }
    </style>
</head>
<body>
    <div id="intro-container">
        <img id="intro-image" src="OIG.jpg" alt="Intro Image">
        <h1>Welcome to Our Website</h1>
        <p>This is a beautiful intro to our website. Enjoy the journey!</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.0/anime.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const introContainer = document.getElementById("intro-container");
            const introImage = document.getElementById("intro-image");
            const titleElement = document.querySelector("title");

            // Animation using Anime.js
            anime({
                targets: introImage,
                opacity: 1,
                translateY: 0,
                duration: 2000,
                easing: 'easeInOutQuad',
                delay: 1000,
                complete: () => {
                    // Redirect to the destination URL after the animation
                    window.location.href = "Trangchu";
                }
            });

            // Function to make title text flash
            function flashTitle() {
                titleElement.innerText = "VUI LÒNG ĐỢI...";
                setTimeout(() => {
                    titleElement.innerText = "VUI LÒNG ĐỢI..";
                    setTimeout(() => {
                        titleElement.innerText = "VUI LÒNG ĐỢI.";
                        setTimeout(() => {
                            titleElement.innerText = "VUI LÒNG ĐỢI";
                            flashTitle(); // Repeat the flashing
                        }, 500);
                    }, 500);
                }, 500);
            }

            // Start flashing the title after a delay
            setTimeout(() => {
                flashTitle();
            }, 1000);
        });
    </script>
</body>
</html>
