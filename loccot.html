<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Page</title>
<style>
body {
    background-color: #000;
    color: #0f0;
    font-family: 'Courier New', monospace;
    text-align: center;
    padding-top: 50px;
}

h1 {
    font-size: 3em;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
}

h2 {
    font-size: 1.5em;
    margin-bottom: 10px;
}

p {
    font-size: 1.2em;
    line-height: 1.6;
    margin-bottom: 20px;
}

button {
    background-color: #00ff00;
    color: #000;
    border: none;
    padding: 10px 20px;
    font-size: 1.2em;
    cursor: pointer;
    transition: background-color 0.3s;
}

button:hover {
    background-color: #0f0;
}

.intro-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.intro-content {
    text-align: center;
}

#question-box {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background-color: #000;
    padding: 20px;
    border: 2px solid #0f0;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
}

#question-box p {
    color: #0f0;
    font-size: 1.2em;
    margin-bottom: 20px;
}

#yes-button,
#no-button {
    background-color: transparent;
    color: #0f0;
    border: 2px solid #0f0;
    padding: 10px 20px;
    font-size: 1.2em;
    cursor: pointer;
    transition: background-color 0.3s, color 0.3s;
}

#yes-button:hover,
#no-button:hover {
    background-color: #0f0;
    color: #000;
}

#yes-button {
    margin-right: 10px;
}

</style>
</head>
<body>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Mảng chứa các đường dẫn của các tệp âm thanh
            const audioFiles = ['music1.mp3', 'music2.mp3'];
    
            // Hàm để chọn ngẫu nhiên một phần tử trong mảng
            function getRandomAudio() {
                return audioFiles[Math.floor(Math.random() * audioFiles.length)];
            }
    
            // Khai báo và tạo đối tượng Audio trong JavaScript với âm thanh được chọn ngẫu nhiên
            const audio = new Audio(getRandomAudio());
    
            // Lắng nghe sự kiện "click" trên toàn bộ tài liệu
            document.addEventListener('click', function() {
                audio.src = getRandomAudio(); // Chọn ngẫu nhiên một tệp âm thanh mới khi có sự kiện "click"
                audio.play(); // Phát âm thanh
            });
        });
    </script>
    
<div class="intro-container">
    <div class="intro-content">
        <h1>HELLO BẠN TÔI</h1>
        <button id="start-button">Start</button>
    </div>
</div>
<div id="question-box">
    <p>Bấm No Nếu bạn Ghét Tôi </p>
        
    <button id="yes-button">Yes</button>
    <button id="no-button">No</button>
</div>
<script>
    const startButton = document.getElementById('start-button');
    const questionBox = document.getElementById('question-box');
    const yesButton = document.getElementById('yes-button');
    const noButton = document.getElementById('no-button');

    startButton.addEventListener('click', function() {
        questionBox.style.display = 'block';
    });

    yesButton.addEventListener('click', function() {
        window.open('loccotv1.html', '_blank'); // Mở liên kết trong một tab mới
    });

    noButton.addEventListener('click', function() {
        window.open('loccotv2.html', '_blank'); // Mở liên kết trong một tab mới
    });
</script>



</body>
</html>
