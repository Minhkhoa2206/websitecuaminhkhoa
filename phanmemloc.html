<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trò Chơi Tìm Ô Liên Kết</title>
<style>
    h1 {
    position: absolute; /* Thiết lập vị trí tuyệt đối */
    top: 0; /* Đặt vị trí của tiêu đề ở đầu trang */
    left: 50%; /* Căn giữa theo chiều ngang */
    transform: translateX(-50%); /* Di chuyển tiêu đề lùi lại phía trái 50% chiều rộng của nó để căn giữa */
    background-color: #333; /* Màu nền */
    color: white; /* Màu chữ */
    padding: 10px 20px; /* Độ dày và khoảng cách giữa văn bản và viền */
    margin: 0; /* Loại bỏ margin mặc định */
}

body {
    background-color: #0f0f0f; /* Màu nền của trang */
    font-family: 'Courier New', monospace; /* Font chữ */
    color: lime; /* Màu chữ */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh; /* Đặt chiều cao của body là 100% chiều cao của viewport */
    margin: 0; /* Loại bỏ margin mặc định */
}

.game-board {
    background-color: #000; /* Màu nền của bảng */
    border-radius: 10px; /* Đường viền cong */
    padding: 20px; /* Khoảng cách giữa các ô */
    box-shadow: 0 4px 8px rgba(0, 255, 0, 0.2); /* Đổ bóng */
}

.cell {
    width: 30px;
    height: 30px;
    border: 1px solid #00ff00; /* Đường viền của ô */
    display: inline-block;
    text-align: center;
    cursor: pointer;
}

.cell:hover {
    background-color: #001f00; /* Màu nền khi hover vào ô */
    border-color: #00ff00; /* Đổi màu đường viền khi hover */
}
/* CSS cơ bản cho màn hình điện thoại */
@media only screen and (max-width: 600px) {
    body {
        font-size: 14px; /* Đặt kích thước font chữ nhỏ hơn cho màn hình nhỏ */
    }

    .game-board {
        padding: 10px; /* Giảm khoảng cách giữa các ô cho màn hình nhỏ */
    }

    .cell {
        width: 20px; /* Giảm kích thước của ô */
        height: 20px;
        font-size: 10px; /* Đặt kích thước font chữ nhỏ hơn cho màn hình nhỏ */
    }
}

</style>
