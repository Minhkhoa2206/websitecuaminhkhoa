<!DOCTYPE html>
<HTML>
    <head>
    <title>Plugin AutoSave Sketchup v1</title>
    <link rel="icon" href="pluginsketchup.png" type="image/jpg">
</head>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background-color: white;
        color: #333;
        text-align: center;
        margin: 2%;
        padding: 20px;
        border: 3px solid grey;
        border-radius: 15px;
    }
    
    .container {
        max-width: 100%;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        padding: 10px;
    }
    
    .item {
        flex-basis: calc(25% - 20px);
        margin: 10px;
        text-align: center;
        padding: 15px;
        background-color: #fff;
        border: 2px solid #333;
        border-radius: 10px;
        transition: transform 0.3s ease;
    }
    
    .item:hover {
        transform: scale(1.05);
    }
    
    img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        margin-bottom: 10px;
        border: 2px solid #333;
        background-color: black;
    }
    
    p {
        font-size: 15px;
        line-height: 1.6;
        border: 2px solid #333;
        border-radius: 8px;
        padding: 10px;
        background-color: ghostwhite;
    }
    
    a {
        text-decoration: none;
        font-family:Arial, Helvetica, sans-serif;
        color: #333;
        font-size: 20px;
        
    }
    
    h1 {
        text-decoration: none;
        background-color: black;
        color: Red;
        font-size: 25px;
        font-family: 'Times New Roman', Times;
        border: 2px solid #333;
        border-radius: 8px;
        padding: 3%;
        
    }
    
    h2 {
    
        font-family: 'Times New Roman', Times;
        color: #333;
        font-size: 20px;
        background-color: greenyellow;
        border: 2px solid #333;
        border-radius: 8px;
        padding: 3%;
        display: inline-block;
    }

    .centered-container {
        text-align: center;
      }
      
      .video-container {
        width: 400px;
        height: 300px;
        display: inline-block;
        overflow: hidden;
      }
      
      .video-container iframe {
        width: 100%;
        height: 100%;
      }
    
</style>

<body>
    <div class="container">
        <a href="404.html" target="_blank">
            <img src="pluginsketchup.png" alt="Description of the image">
            <p> Plugin Đơn vị chuẩn + Autosave Sketchup </p>
        </a>
    </div>
    <body>
        <div class="centered-text">
            <h1>Hướng Dẫn Cài Đặt Và Sử Dụng </h1>
            <div class="centered-container">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/eEIUxHBvDok" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
    </body>
</body>
</HTML>
